          description: Conflict
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sperr.ErrorModel'
          description: Internal Server Error
      summary: Create org
      tags:
      - Orgs
      x-codegen-request-body-name: request
