  /org:
    get:
      description: List the organizations on which the user has access. The action
        supports list pagination and does not return more than 50 organizations at
        a time.If there are more organizations to list, then there is a value in next_token.
        You can use the next_token value to continue the pagination of the list by
        passing the value in next_token in the request to get the next page. This
        will only return the organization which the user has access.
      operationId: list-orgs
      parameters:
      - description: Pagination limit
        explode: true
        in: query
        name: limit
        required: false
