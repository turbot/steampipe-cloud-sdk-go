          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sperr.ErrorModel'
          description: Unauthorized
        "402":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sperr.ErrorModel'
          description: Payment Required
        "403":
